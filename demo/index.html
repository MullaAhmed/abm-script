<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABM Personalization Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #111; }

    .simulator {
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      padding: 1.5rem;
    }
    .simulator-inner { max-width: 40rem; margin: 0 auto; }
    .simulator h2 {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .grid label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .grid label span {
      font-size: 0.75rem;
      font-weight: 500;
      color: #6b7280;
      text-transform: capitalize;
    }
    .grid input {
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      padding: 0.375rem 0.75rem;
      font-size: 0.875rem;
      outline: none;
    }
    .grid input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .btn {
      margin-top: 1rem;
      padding: 0.5rem 1.25rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .btn:hover { background: #333; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem;
      gap: 1.5rem;
    }
    .hero h1 { font-size: 3rem; font-weight: 700; max-width: 36rem; }
    .hero .subtext { font-size: 1.25rem; color: #4b5563; max-width: 28rem; }
    .hero .cta {
      padding: 0.75rem 2rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1.125rem;
      cursor: pointer;
    }
    .hero .cta:hover { background: #1d4ed8; }
    .hero .social-proof { font-size: 0.875rem; color: #9ca3af; margin-top: 2rem; }

    [data-personalized="true"] {
      transition: opacity 0.3s;
      animation: fadeIn 0.4s ease-in;
    }
    @keyframes fadeIn { from { opacity: 0.4; } to { opacity: 1; } }
  </style>
</head>
<body>

  <!-- Simulate visitor identity -->
  <section class="simulator">
    <div class="simulator-inner">
      <h2>Simulate Visitor Identity</h2>
      <form data-abm-trigger class="grid">
        <label>
          <span>First Name</span>
          <input type="text" name="first_name" value="Jane">
        </label>
        <label>
          <span>Last Name</span>
          <input type="text" name="last_name" value="Smith">
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" value="jane@acme.com">
        </label>
        <label>
          <span>Company</span>
          <input type="text" name="company_name" value="Acme Corp">
        </label>
        <label>
          <span>Role</span>
          <input type="text" name="title" value="VP of Marketing">
        </label>
        <label>
          <span>Industry</span>
          <input type="text" name="company_industry" value="SaaS">
        </label>
        <div style="grid-column: span 2;">
          <button type="submit" class="btn" id="personalize-btn">
            Personalize Landing Page
          </button>
        </div>
      </form>
    </div>
  </section>

  <!-- Demo landing page — just add dummy-ops-element to anything you want personalized -->
  <section class="hero">
    <h1 dummy-ops-element="headline">Accelerate Your Growth</h1>
    <p class="subtext" dummy-ops-element="subtext">The all-in-one platform teams love.</p>
    <button class="cta" dummy-ops-element="cta">Get Started</button>
    <p class="social-proof" dummy-ops-element="proof">Trusted by 500+ companies worldwide</p>
  </section>

  <!-- Thin client script -->
  <script src="/api/snippet.js"></script>
  <script>
    initABM({
      backendURL: window.location.origin,
      debug: true
    });

    var btn = document.getElementById("personalize-btn");
    document.querySelector("form[data-abm-trigger]").addEventListener("submit", function() {
      btn.textContent = "Personalizing...";
      btn.disabled = true;
    });
    window.addEventListener("abm:personalized", function() {
      btn.textContent = "Re-personalize";
      btn.disabled = false;
    });
  </script>

</body>
</html>
